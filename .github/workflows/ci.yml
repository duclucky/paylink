name: CI
on:
  push:
    branches: [main, master]
  pull_request: {}

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm run lint
      - run: npm test
      - run: npm run build

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
      # Callee first so payrequest's contractimport! finds receipt.wasm
      - name: Test + build receipt
        working-directory: contracts/receipt
        run: |
          cargo test --locked
          cargo build --locked --target wasm32v1-none --release
      - name: Test + build payrequest
        working-directory: contracts/payrequest
        run: |
          cargo test --locked
          cargo build --locked --target wasm32v1-none --release
